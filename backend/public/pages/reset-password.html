<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SkillSyntax | Reset Password</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a1f3b,#0f2f59,#029e99);
}

.container{
  display:flex;
  width:850px;
  height:500px;
  background:rgba(255,255,255,0.95);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.left{
  flex:1;
  background:linear-gradient(135deg,#029e99,#59d2ec);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.logo-img{
  width:180px;
  margin-bottom:20px;
}

.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:100%;
  max-width:320px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#029e99;
  color:white;
  cursor:pointer;
}

#msg{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <img src="logo2.png" class="logo-img">
  <h1>SkillSyntax</h1>
  <p>Reset your password</p>
</div>

<div class="right">
  <div class="box">
    <h2>Nueva contraseña</h2>

    <input id="password" type="password" placeholder="Nueva contraseña">
    <button onclick="resetPassword()">Actualizar</button>

    <div id="msg"></div>
  </div>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function resetPassword(){
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if(!password){
    msg.innerText = "Ingresa una contraseña";
    msg.style.color = "red";
    return;
  }

  try{
  const res = await fetch("https://skillsyntax-2war.onrender.com/api/login/reset-password", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ token, password })
  });

  const data = await res.json();

  msg.innerText = data.msg || data.error;

  if (data.error) {
    msg.style.color = "red";
  } else {
    msg.style.color = "green";

    setTimeout(() => {
      window.location.href = "/";
    }, 1500);
  }

}catch(err){
  msg.innerText = "Error al actualizar";
  msg.style.color = "red";
}
}

</script>

</body>
</html>
