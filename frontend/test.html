<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SkillSyntax | Test</title>

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a1f3b;
  padding: 30px;
}

/* NAVBAR */

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #ffffff;
  padding: 15px 35px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  max-width: 1100px;
  margin: 0 auto 30px auto;
}

.nav-logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #0a1f3b;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
}

.logout button {
  background: #0a3a75;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
}

/* CARD */

.card {
  background: #fbfaf7;
  max-width: 800px;
  margin: auto;
  padding: 25px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #029e99;
  color: white;
  cursor: pointer;
}

.pregunta {
  margin-top: 15px;
  padding: 15px;
  background: white;
  border-radius: 8px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

</style>
</head>

<body>

<header class="navbar">

<div class="nav-logo">S</div>

<div class="logout">
<button onclick="logout()">Cerrar sesión</button>
</div>

</header>

<div class="card">

<h2>SkillSyntax</h2>

<input id="tema" placeholder="Tema (ej. Food)">
<input id="nivel" placeholder="Nivel (A1, A2, B1...)">

<div style="text-align:center;">

<button onclick="generar('reading')">Reading</button>
<button onclick="generar('listening')">Listening</button>
<button onclick="generar('speaking')">Speaking</button>
<button onclick="generar('writing')">Writing</button>

</div>

<div id="resultado"></div>

<div style="text-align:center; margin-top:15px;">
<button id="btnEnviar" onclick="enviarReading()" style="display:none;">
Enviar respuestas
</button>
</div>

</div>


<!-- FIREBASE (NO TOCADO) -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
authDomain: "skillsyntax-ai.firebaseapp.com",
projectId: "skillsyntax-ai",
storageBucket: "skillsyntax-ai.firebasestorage.app",
messagingSenderId: "1027375145468",
appId: "1:1027375145468:web:60b7023e38a3654ccbd279"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

if (!user) {
window.location.href = "login.html";
}

});

window.logout = async function () {

await signOut(auth);
window.location.href = "login.html";

};

</script>


<script>

let ejercicioActual = null;


// GENERAR EJERCICIO

async function generar(tipo) {

const tema = document.getElementById("tema").value;
const nivel = document.getElementById("nivel").value;
const resultado = document.getElementById("resultado");

resultado.innerHTML = "Generando...";


// ===== READING =====

if (tipo === "reading") {

const response = await fetch("http://localhost:3000/api/reading", {

method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ tema, nivel })

});

const data = await response.json();

ejercicioActual = data;

resultado.innerHTML = `<p>${data.texto}</p>`;

if (data.tipo === "opcion_multiple") {

data.preguntas.forEach((p, i) => {

resultado.innerHTML += `
<div class="pregunta">
<strong>${p.pregunta}</strong><br>
${p.opciones.map(op => `
<label>
<input type="radio" name="p${i}" value="${op}">
${op}
</label><br>
`).join("")}
</div>
`;

});

}

document.getElementById("btnEnviar").style.display = "inline-block";

}


// ===== LISTENING CON AUDIO =====

else if (tipo === "listening") {

const response = await fetch("http://localhost:3000/api/listening", {

method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ tema, nivel })

});

const data = await response.json();

ejercicioActual = data;

resultado.innerHTML = `

<h3>Listening Exercise</h3>

<audio controls>
<source src="${data.audioUrl}" type="audio/mpeg">
Tu navegador no soporta audio
</audio>

<div class="pregunta">
${data.texto}
</div>

`;

if (data.preguntas) {

data.preguntas.forEach((p, i) => {

resultado.innerHTML += `
<div class="pregunta">
<strong>${p.pregunta}</strong><br>
${p.opciones.map(op => `
<label>
<input type="radio" name="p${i}" value="${op}">
${op}
</label><br>
`).join("")}
</div>
`;

});

document.getElementById("btnEnviar").style.display = "inline-block";

}

}


// ===== SPEAKING =====

else if (tipo === "speaking") {

resultado.innerHTML = "Speaking próximamente";
document.getElementById("btnEnviar").style.display = "none";

}


// ===== WRITING =====

else if (tipo === "writing") {

resultado.innerHTML = "Writing próximamente";
document.getElementById("btnEnviar").style.display = "none";

}

}



// CALIFICAR

async function enviarReading() {

let respuestas = [];

ejercicioActual.preguntas.forEach((_, i) => {

const seleccion =
document.querySelector(`input[name="p${i}"]:checked`);

respuestas.push(seleccion ? seleccion.value : "");

});

const response = await fetch(
"http://localhost:3000/api/reading/calificar",
{
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
ejercicio: ejercicioActual,
respuestaUsuario: respuestas
})
}
);

const resultadoIA = await response.json();

document.getElementById("resultado").innerHTML += `
<div class="pregunta">
Score: ${resultadoIA.score}/100
<br>
Feedback: ${resultadoIA.feedback}
</div>
`;

document.getElementById("btnEnviar").style.display = "none";

}

</script>

</body>
</html>
