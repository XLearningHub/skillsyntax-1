<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>SkillSyntax | Test</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a1f3b;
  padding: 30px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 15px 30px;
  border-radius: 15px;
  margin-bottom: 25px;
}

.nav-logo {
  background: #0a1f3b;
  color: white;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.card {
  background: #fbfaf7;
  padding: 25px;
  border-radius: 16px;
  max-width: 900px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #029e99;
  color: white;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #027d79;
}

.pregunta {
  margin-top: 20px;
  background: white;
  padding: 18px;
  border-radius: 12px;
}

.opcion-btn {
  display: block;
  width: 100%;
  text-align: left;
  margin-top: 8px;
  background: #f1f1f1;
  color: #333;
}

.opcion-btn:hover {
  background: #ddd;
}

.opcion-btn.seleccionado {
  background: #029e99;
  color: white;
}

.resultado-box {
  margin-top: 20px;
  padding: 15px;
  background: #eefafa;
  border-radius: 10px;
}

/* 🔥 NUEVO DISEÑO WRITING */
.input-blank {
  width: 130px;
  padding: 6px 8px;
  margin: 0 5px;
  border: 2px solid #029e99;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  outline: none;
}

.input-blank:focus {
  background: #eefafa;
}

.texto-writing {
  font-size: 18px;
  line-height: 1.8;
  text-align: justify;
}

.banco-palabras {
  margin-top: 15px;
  padding: 12px;
  background: #f1f8f8;
  border-radius: 10px;
}

.palabra {
  display: inline-block;
  background: #029e99;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  margin: 5px;
}
</style>
</head>

<body>

<header class="navbar">
  <div class="nav-logo">S</div>
  <div>SkillSyntax AI</div>
</header>

<div class="card">

<h2>Practice Test</h2>

<input id="tema" placeholder="Tema (ej. Food)">
<select id="nivel">
  <option value="">Selecciona nivel</option>
  <option value="A1">A1 - Básico</option>
  <option value="A2">A2 - Básico Alto</option>
  <option value="B1">B1 - Intermedio</option>
  <option value="B2">B2 - Intermedio Alto</option>
  <option value="C1">C1 - Avanzado</option>
  <option value="C2">C2 - Experto</option>
</select>

<div style="text-align:center;">
  <button onclick="generar('reading')">Reading</button>
  <button onclick="generar('listening')">Listening</button>
  <button onclick="generar('speaking')">Speaking</button>
  <button onclick="generar('writing')">Writing</button>
</div>

<div id="resultado"></div>

<div style="text-align:center;">
  <button id="btnEnviar" style="display:none;">Enviar respuestas</button>
</div>

</div>

<script>

let ejercicioActual = null;
let respuestasUsuario = [];
let sesionId = null;
let tipoActual = "";

async function generar(tipo) {

  tipoActual = tipo;

  const tema = document.getElementById("tema").value || "daily life";
  const nivel = document.getElementById("nivel").value || "A1";
  const usuarioId = parseInt(localStorage.getItem("usuario_id"), 10); // ✅ convertir a número

  try {
    const sesionRes = await fetch("http://localhost:3000/api/sesiones", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario_id: usuarioId, tema, nivel }) // ✅ ya es número
    });

    const sesionData = await sesionRes.json();
    sesionId = sesionData.id;

    if(!sesionData.success){
      console.error("Error al guardar sesión:", sesionData.error);
    }

  } catch (error) {
    console.error("Error en fetch de sesión:", error);
  }

  document.getElementById("resultado").innerHTML = "Generando...";
  respuestasUsuario = [];

  const res = await fetch(`http://localhost:3000/api/${tipo}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tema, nivel })
  });

  const data = await res.json();
  ejercicioActual = data;

  let contenido = "";

  if (tipo === "reading") {
    contenido = `
      <div class="pregunta">${data.texto}</div>
      ${(data.preguntas || []).map((p, i) => `
        <div class="pregunta">
          <p><strong>${i + 1}. ${p.pregunta}</strong></p>
          ${p.opciones.map(op => `
            <button class="opcion-btn" onclick="seleccionarRespuesta(${i}, '${op}', this)">
              ${op}
            </button>
          `).join("")}
        </div>
      `).join("")}
    `;
    btnEnviar.style.display = "block";
    btnEnviar.onclick = enviarReading;
  }

  if (tipo === "listening") {
    contenido = `
      <div class="pregunta">
        <audio controls src="${data.audio || ''}"></audio>
      </div>
      ${(data.preguntas || []).map((p, i) => `
        <div class="pregunta">
          <p><strong>${i + 1}. ${p.pregunta}</strong></p>
          ${p.opciones.map(op => `
            <button class="opcion-btn" onclick="seleccionarRespuesta(${i}, '${op}', this)">
              ${op}
            </button>
          `).join("")}
        </div>
      `).join("")}
    `;
    btnEnviar.style.display = "block";
    btnEnviar.onclick = enviarListening;
  }

  if (tipo === "speaking") {
    const texto = data.prompt || data.texto || "";
    contenido = `<div class="pregunta"><p><strong>${texto}</strong></p></div>`;
    btnEnviar.style.display = "none";
  }

  if (tipo === "writing") {

    let texto = data.texto || "";
    const palabras = data.palabras || [];

    let index = 0;

    texto = texto.replace(/____/g, () => {
      const i = index++;
      return `<input class="input-blank" placeholder="..." oninput="guardarWriting(${i}, this.value)">`;
    });

    contenido = `
      <div class="pregunta texto-writing">${texto}</div>

      <div class="banco-palabras">
        <strong>Palabras disponibles:</strong><br>
        ${palabras.map(p => `<span class="palabra">${p}</span>`).join("")}
      </div>
    `;

    btnEnviar.style.display = "block";
    btnEnviar.onclick = enviarWriting;
  }

  document.getElementById("resultado").innerHTML = contenido;
}

function seleccionarRespuesta(i, op, btn) {
  respuestasUsuario[i] = op;
  btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("seleccionado"));
  btn.classList.add("seleccionado");
}

function guardarWriting(i, val) {
  respuestasUsuario[i] = val;
}

async function enviarReading() {
  const res = await fetch("http://localhost:3000/api/reading/calificar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ejercicio: ejercicioActual, respuestaUsuario: respuestasUsuario })
  });
  mostrarResultado(await res.json());
}

async function enviarListening() {
  const res = await fetch("http://localhost:3000/api/listening/calificar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ejercicio: ejercicioActual, respuestaUsuario: respuestasUsuario })
  });
  mostrarResultado(await res.json());
}

async function enviarWriting() {
  const res = await fetch("http://localhost:3000/api/writing/calificar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ejercicio: ejercicioActual, respuestaUsuario: respuestasUsuario })
  });
  mostrarResultado(await res.json());
}

function mostrarResultado(data) {
  document.getElementById("resultado").innerHTML += `
    <div class="resultado-box">
      <strong>Score: ${data.score}</strong>
      <p>${data.feedback}</p>
    </div>
  `;
  btnEnviar.style.display = "none";

  // 🔥 GUARDAR RESULTADO EN BD
  fetch("http://localhost:3000/api/resultados", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sesion_id: sesionId,
      habilidad: tipoActual,
      puntaje: data.score,
      respuestas: respuestasUsuario,
      feedback: data.feedback
    })
  })
  .then(res => res.json())
  .then(data => {
    if(!data.success){
      console.error("Error guardando resultado:", data.error);
    }
  })
  .catch(err => {
    console.error("Error en fetch resultados:", err);
  });
}

</script>

</body>
</html>
