<input id="tema" placeholder="Tema">
<input id="nivel" placeholder="Nivel">

<button onclick="generar('reading')">Reading</button>
<button onclick="generar('listening')">Listening</button>
<button onclick="generar('speaking')">Speaking</button>
<button onclick="generar('writing')">Writing</button>

<div id="resultado"></div>

<script>
async function generar(tipo) {
  const tema = document.getElementById('tema').value;
  const nivel = document.getElementById('nivel').value;

  const response = await fetch(`http://localhost:3000/api/${tipo}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tema, nivel })
  });

  const data = await response.json();

  document.getElementById('resultado').innerText = data[tipo];

  // Guardar nivel
  await fetch("http://localhost:3000/api/guardar_nivel", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ seccion: tipo, nivel: nivel })
  });
}
</script>
