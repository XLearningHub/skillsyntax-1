<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SkillSyntax | Test</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1f3b;
      padding: 30px;
    }

    /* ===== MENU ===== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      padding: 15px 35px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      max-width: 1100px;
      margin: 0 auto 30px auto;
    }

    .nav-left {
      display: flex;
      align-items: center;
    }

    .nav-logo {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #0a1f3b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }

    .nav-center a {
      margin: 0 18px;
      text-decoration: none;
      color: #111;
      font-weight: 500;
    }

    .nav-center a:hover {
      color: #0a1f3b;
    }

    .logout button {
      background: #0a3a75;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    .logout button:hover {
      background: #062c57;
    }

    /* ===== CARD ===== */
    .card {
      background: #fbfaf7;
      max-width: 800px;
      margin: auto;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #161616;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #029e99;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #027d79;
    }

    #resultado {
      margin-top: 20px;
    }

    .pregunta {
      margin-top: 15px;
      padding: 10px;
      background: white;
      border-radius: 8px;
    }

    /* ===== RESULTADO MEJORADO ===== */

    .resultado-box {
      margin-top: 25px;
      padding: 20px;
      border-radius: 14px;
      background: linear-gradient(135deg, #eefafa, #ffffff);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      animation: fadeIn 0.4s ease-in-out;
    }

    .resultado-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .score-badge {
      background: #029e99;
      color: white;
      padding: 10px 18px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .feedback-text {
      margin-top: 10px;
      padding: 12px;
      background: white;
      border-left: 5px solid #029e99;
      border-radius: 8px;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

<header class="navbar">
  <div class="nav-left">
    <div class="nav-logo">S</div>
  </div>

  <nav class="nav-center">
    <a href="#">Home</a>
    <a href="#">Practice</a>
    <a href="#">Progress</a>
    <a href="#">Report</a>
  </nav>

  <div class="logout" onclick="logout()">
      <button>Cerrar sesión</button>
  </div>
</header>

<div class="card">
  <h2>SkillSyntax</h2>

  <input id="tema" placeholder="Tema (ej. Food)">
  <input id="nivel" placeholder="Nivel (A1, A2, B1...)">

  <div style="text-align:center;">
    <button onclick="generar('reading')">Reading</button>
    <button onclick="generar('listening')">Listening</button>
    <button onclick="generar('speaking')">Speaking</button>
    <button onclick="generar('writing')">Writing</button>
  </div>

  <div id="resultado"></div>

  <div style="text-align:center; margin-top:15px;">
    <button id="btnEnviar" onclick="enviarReading()" style="display:none;">
      Enviar respuestas
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
    authDomain: "skillsyntax-ai.firebaseapp.com",
    projectId: "skillsyntax-ai",
    storageBucket: "skillsyntax-ai.firebasestorage.app",
    messagingSenderId: "1027375145468",
    appId: "1:1027375145468:web:60b7023e38a3654ccbd279"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "login.html";
  });

  window.logout = async () => {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

<script>
  let ejercicioActual = null;

  async function generar(tipo) {
    if (tipo !== "reading") {
      document.getElementById("resultado").innerHTML =
        "<p>Esta sección se evaluará más adelante.</p>";
      document.getElementById("btnEnviar").style.display = "none";
      return;
    }

    const tema = document.getElementById("tema").value;
    const nivel = document.getElementById("nivel").value;

    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "Generando ejercicio...";

    const response = await fetch("http://localhost:3000/api/reading", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tema, nivel })
    });

    const data = await response.json();
    ejercicioActual = data;

    resultado.innerHTML = `<p>${data.texto}</p>`;

    if (data.tipo === "opcion_multiple") {
      data.preguntas.forEach((p, i) => {
        resultado.innerHTML += `
          <div class="pregunta">
            <strong>${p.pregunta}</strong><br>
            ${p.opciones.map(op => `
              <label>
                <input type="radio" name="p${i}" value="${op}">
                ${op}
              </label><br>
            `).join("")}
          </div>
        `;
      });
    }

    if (data.tipo === "completar") {
      data.respuestas.forEach((_, i) => {
        resultado.innerHTML += `
          <input class="respuestaCompletar" placeholder="Respuesta ${i + 1}">
        `;
      });
    }

    document.getElementById("btnEnviar").style.display = "inline-block";
  }

  async function enviarReading() {
    let respuestas = [];

    if (ejercicioActual.tipo === "opcion_multiple") {
      ejercicioActual.preguntas.forEach((_, i) => {
        const seleccion = document.querySelector(`input[name="p${i}"]:checked`);
        respuestas.push(seleccion ? seleccion.value : "");
      });
    }

    if (ejercicioActual.tipo === "completar") {
      document.querySelectorAll(".respuestaCompletar").forEach(input => {
        respuestas.push(input.value);
      });
    }

    const response = await fetch("http://localhost:3000/api/reading/calificar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ejercicio: ejercicioActual,
        respuestaUsuario: respuestas
      })
    });

    const resultadoIA = await response.json();

    document.getElementById("resultado").innerHTML += `
      <div class="resultado-box">
        <div class="resultado-header">
          <h3>Resultado</h3>
          <div class="score-badge">
            ${resultadoIA.score} / 100
          </div>
        </div>

        <div class="feedback-text">
          ${resultadoIA.feedback}
        </div>
      </div>
    `;

    document.getElementById("btnEnviar").style.display = "none";
  }
</script>

</body>
</html>
