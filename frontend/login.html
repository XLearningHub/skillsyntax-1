<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login SkillSyntax</title>

  <style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a1f3b; 
  }

  .login-card {
    background: #fbfaf7;
    width: 360px;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
  }

  .login-card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #161616;
  }

  .login-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  .login-card input:focus {
    outline: none;
    border-color: #59d2ec;
    box-shadow: 0 0 0 2px rgba(89,210,236,0.3);
  }

  .login-card button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #029e99; 
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .login-card button:hover {
    background: #027d79;
  }

  .login-card p {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #161616;
  }

  .login-card a {
    color: #59d2ec;
    text-decoration: none;
    font-weight: 600;
  }

  #msg {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
  }
</style>

</head>

<body>

  <div class="login-card">
    <h2>SkillSyntax</h2>

    <input id="email" type="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Iniciar sesión</button>

    <p>
      ¿No tienes cuenta?
      <a href="register.html">Regístrate</a>
    </p>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
      authDomain: "skillsyntax-ai.firebaseapp.com",
      projectId: "skillsyntax-ai",
      storageBucket: "skillsyntax-ai.firebasestorage.app",
      messagingSenderId: "1027375145468",
      appId: "1:1027375145468:web:60b7023e38a3654ccbd279"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

   
    /*
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "test.html";
      }
    })
    */

    window.login = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");

      if (!email || !password) {
        msg.innerText = "⚠️ Ingresa correo y contraseña";
        msg.style.color = "red";
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem("user_id", userCredential.user.uid);
        msg.innerText = "Login correcto";
        msg.style.color = "green";
        window.location.href = "test.html";
      } catch (error) {
        msg.style.color = "red";
        if (error.code === "auth/user-not-found") {
          msg.innerText = "El usuario no existe";
        } else if (error.code === "auth/wrong-password") {
          msg.innerText = "Contraseña incorrecta";
        } else {
          msg.innerText = error.message;
        }
      }
    };
  </script>

</body>
</html>
