<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SkillSyntax | Login</title>

<style>

*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a1f3b,#0f2f59,#029e99);
}

/* CONTENEDOR */
.container{
  display:flex;
  width:850px;
  height:500px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(6px);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

/* LADO IZQUIERDO */
.left{
  flex:1;
  background:linear-gradient(135deg,#029e99,#59d2ec);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.logo-img{
  width:180px;
  margin-bottom:20px;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.25));
}

.left h1{
  margin:0;
  font-size:28px;
}

.left p{
  margin-top:10px;
  text-align:center;
  opacity:0.9;
}

/* LADO DERECHO */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.login-box{
  width:100%;
  max-width:320px;
}

.login-box h2{
  margin-bottom:10px;
  color:#0a1f3b;
}

.subtitle{
  margin-bottom:25px;
  color:#777;
  font-size:14px;
}

/* INPUTS */
.input-group{
  margin-bottom:15px;
}

.input-group input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
  transition:0.25s;
}

.input-group input:focus{
  outline:none;
  border-color:#029e99;
  box-shadow:0 0 0 3px rgba(2,158,153,0.15);
}

/* BOTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#029e99;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:#027d79;
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* LINK */
.register{
  margin-top:15px;
  text-align:center;
  font-size:14px;
}

.register a{
  color:#029e99;
  text-decoration:none;
  font-weight:600;
}

.register a:hover{
  text-decoration:underline;
}

#msg{
  margin-top:10px;
  text-align:center;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

  <!-- IZQUIERDA -->
<div class="left">
  <img src="logo2.png" class="logo-img">
  <h1>SkillSyntax</h1>
  <p>
    Improve your English.<br>
    Practice smarter. Learn faster.
  </p>
</div>

  <!-- DERECHA -->
  <div class="right">

    <div class="login-box">

      <h2>Iniciar sesión</h2>
      <div class="subtitle">Continúa tu aprendizaje</div>

      <div class="input-group">
        <input id="email" type="email" placeholder="Correo">
      </div>

      <div class="input-group">
        <input id="password" type="password" placeholder="Contraseña">
      </div>

      <button onclick="login()">Entrar</button>

      <div class="register">
        ¿No tienes cuenta?
        <a href="register.html">Crear cuenta</a>
      </div>

      <div id="msg"></div>

    </div>

  </div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
  authDomain:"skillsyntax-ai.firebaseapp.com",
  projectId:"skillsyntax-ai",
  storageBucket:"skillsyntax-ai.firebasestorage.app",
  messagingSenderId:"1027375145468",
  appId:"1:1027375145468:web:60b7023e38a3654ccbd279"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

window.login = async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Ingresa correo y contraseña";
    msg.style.color = "red";
    return;
  }

  try {

    const res = await fetch("http://localhost:3000/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log("RESPUESTA BACKEND:", data);

    if (!res.ok) {
      msg.innerText = data.error || "Error al iniciar sesión";
      msg.style.color = "red";
      return;
    }

    // 🔥 GUARDAR TODO EL USUARIO (IMPORTANTE)
    localStorage.setItem("usuario", JSON.stringify(data));
    localStorage.setItem("usuario_id", data.id);

    msg.innerText = "Bienvenido";
    msg.style.color = "green";

    setTimeout(() => {
      if (data.rol === "admin") {
        window.location.href = "admin/dashboard.html";
      } else {
        window.location.href = "test.html";
      }
    }, 800);

  } catch (error) {
    console.error(error);
    msg.innerText = "Error de conexión con servidor";
    msg.style.color = "red";
  }
};

</script>

</body>
</html>
