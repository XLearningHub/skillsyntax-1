<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios | SkillSyntax Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #060e1a;
            --bg-card: #0d1b2e;
            --bg-sidebar: #081427;
            --primary: #00c2cb;
            --danger: #ff5f52;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            background: var(--bg-sidebar);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        .sidebar-top h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 40px;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
            letter-spacing: -1px;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar nav a i { width: 20px; margin-right: 12px; text-align: center; }

        .sidebar nav a:hover { background: rgba(0, 194, 203, 0.1); color: var(--primary); }

        .sidebar nav a.active {
            background: var(--primary) !important;
            color: #000 !important;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 194, 203, 0.3);
        }

        .logout {
            background: rgba(231, 76, 60, 0.1) !important;
            color: var(--danger) !important;
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; font-weight: 700; }
        .subtitle { color: var(--text-dim); margin-bottom: 35px; }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-refresh {
            background: rgba(0, 194, 203, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 194, 203, 0.2);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-refresh:hover { background: var(--primary); color: #000; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }

        th {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 15px;
        }

        td {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px 15px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td:first-child { border-radius: 15px 0 0 15px; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        td:last-child { border-radius: 0 15px 15px 0; border-right: 1px solid rgba(255, 255, 255, 0.05); }

        .id-cell { color: var(--primary); font-weight: 700; }
        .name-cell { font-weight: 700; color: #fff; }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .role-admin { background: rgba(0, 194, 203, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .role-user { background: rgba(160, 174, 192, 0.1); color: var(--text-dim); border: 1px solid var(--text-dim); }

        .btn-delete {
            background: rgba(255, 95, 82, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 95, 82, 0.2);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-delete:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">
            <h2>SkillSyntax Admin</h2>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="usuarios.html" class="active"><i class="fas fa-users"></i> Usuarios</a>
                <a href="ejercicios.html"><i class="fas fa-book"></i> Ejercicios</a>
                <a href="reportes.html"><i class="fas fa-file-alt"></i> Reportes</a>
            </nav>
        </div>
        <a href="#" class="logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </a>
    </div>

    <div class="content">
        <h1>Gestión de Usuarios</h1>
        <p class="subtitle">Administra los permisos y cuentas de SkillSyntax.</p>

        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:25px;">

    <button class="btn-refresh" onclick="cargarUsuarios()">
        <i class="fas fa-sync-alt"></i> Actualizar Lista
    </button>

    <button class="btn-refresh" onclick="irCrearUsuario()" style="background: var(--primary); color:#000;">
        <i class="fas fa-user-plus"></i> Agregar usuario
    </button>

</div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Nivel</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/usuarios.js?v=2"></script>
</body>
</html>
