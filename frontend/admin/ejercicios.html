<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios | SkillSyntax Admin</title>
    <meta name="description" content="Gestión de ejercicios generados por alumno y grupo en el panel de administración de SkillSyntax.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Variables ─────────────────────────────────────────────────────── */
        :root {
            --bg-dark:    #060e1a;
            --bg-card:    #0d1b2e;
            --bg-sidebar: #081427;
            --primary:    #00c2cb;
            --accent:     #7c5cfc;
            --success:    #22c55e;
            --danger:     #ff5f52;
            --warning:    #f59e0b;
            --text-main:  #ffffff;
            --text-dim:   #a0aec0;
            --border:     rgba(255,255,255,0.06);
        }

        /* ── Reset & Base ──────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ───────────────────────────────────────────────────────── */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            background: var(--bg-sidebar);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--border);
            box-sizing: border-box;
            z-index: 100;
        }

        .sidebar-top h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 40px;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
            letter-spacing: -1px;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar nav a i { width: 20px; margin-right: 12px; text-align: center; }
        .sidebar nav a:hover { background: rgba(0,194,203,0.1); color: var(--primary); }
        .sidebar nav a.active {
            background: var(--primary) !important;
            color: #000 !important;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,194,203,0.3);
        }

        .logout {
            background: rgba(231,76,60,0.1) !important;
            color: var(--danger) !important;
            border: 1px solid rgba(231,76,60,0.2);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .logout:hover { background: rgba(231,76,60,0.2) !important; }

        /* ── Content Area ──────────────────────────────────────────────────── */
        .content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 2.2rem; margin: 0 0 5px; font-weight: 700; }
        .subtitle { color: var(--text-dim); margin: 0; }

        /* ── Vista Selector (Tab Pills) ────────────────────────────────────── */
        .vista-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: fit-content;
        }

        .btn-vista {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 11px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn-vista:hover {
            background: rgba(0,194,203,0.1);
            color: var(--primary);
        }

        .btn-vista.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 14px rgba(0,194,203,0.35);
        }

        /* ── Breadcrumb ────────────────────────────────────────────────────── */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            font-size: 0.88rem;
            color: var(--text-dim);
        }

        .breadcrumb span { cursor: default; }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .breadcrumb a:hover { opacity: 0.75; }

        .breadcrumb i { font-size: 0.75rem; opacity: 0.5; }

        /* ── Card ──────────────────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        /* ── Stat Cards (detalle de grupo) ─────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: rgba(0,194,203,0.07);
            border: 1px solid rgba(0,194,203,0.2);
            border-radius: 16px;
            padding: 20px 24px;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .stat-card .stat-sub {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ── Table ─────────────────────────────────────────────────────────── */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }

        th {
            color: var(--text-dim);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 15px;
            text-align: left;
        }

        th:first-child { text-align: center; }

        td {
            background: rgba(255,255,255,0.02);
            padding: 16px 15px;
            text-align: left;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.92rem;
            vertical-align: middle;
        }

        td:first-child {
            border-radius: 14px 0 0 14px;
            border-left: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        td:last-child {
            border-radius: 0 14px 14px 0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover td { background: rgba(255,255,255,0.04); }

        /* ── Cells ─────────────────────────────────────────────────────────── */
        .id-cell   { color: var(--primary); font-weight: 700; font-size: 0.82rem; }
        .name-cell { font-weight: 600; color: var(--text-main); }

        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .user-info-name  { font-weight: 600; font-size: 0.93rem; }
        .user-info-email { color: var(--text-dim); font-size: 0.78rem; }

        /* ── Link buttons ──────────────────────────────────────────────────── */
        .btn-link {
            background: none;
            border: none;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: inherit;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-decoration-color: transparent;
            transition: text-decoration-color 0.2s;
        }
        .btn-link:hover { text-decoration-color: var(--primary); }

        /* ── Habilidad Badge ───────────────────────────────────────────────── */
        .badge-hab {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
        }
        .hab-speaking  { background: rgba(0,194,203,0.15);  color: var(--primary); }
        .hab-writing   { background: rgba(124,92,252,0.15); color: var(--accent); }
        .hab-reading   { background: rgba(34,197,94,0.15);  color: var(--success); }
        .hab-listening { background: rgba(245,158,11,0.15); color: var(--warning); }
        .hab-default   { background: rgba(160,174,192,0.15); color: var(--text-dim); }

        /* ── Score badge ───────────────────────────────────────────────────── */
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .score-high { background: rgba(34,197,94,0.15);  color: var(--success); }
        .score-mid  { background: rgba(245,158,11,0.15); color: var(--warning); }
        .score-low  { background: rgba(255,95,82,0.15);  color: var(--danger); }

        /* ── Count badge (vista resumen) ───────────────────────────────────── */
        .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0,194,203,0.12);
            border: 1px solid rgba(0,194,203,0.25);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* ── Feedback cell ─────────────────────────────────────────────────── */
        .feedback-cell {
            max-width: 280px;
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* ── Audio ─────────────────────────────────────────────────────────── */
        audio {
            height: 28px;
            width: 140px;
            filter: invert(1) hue-rotate(180deg) brightness(1.4);
            opacity: 0.65;
        }

        /* ── Action buttons ────────────────────────────────────────────────── */
        .btn-delete {
            background: rgba(255,95,82,0.1);
            color: var(--danger);
            border: 1px solid rgba(255,95,82,0.2);
            padding: 7px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.25s;
        }
        .btn-delete:hover { background: var(--danger); color: #fff; }

        .btn-nav {
            background: rgba(0,194,203,0.1);
            color: var(--primary);
            border: 1px solid rgba(0,194,203,0.2);
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.25s;
        }
        .btn-nav:hover { background: var(--primary); color: #000; }

        /* ── Empty / Loading states ────────────────────────────────────────── */
        .estado-tabla {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-dim);
        }
        .estado-tabla i  { font-size: 2.5rem; opacity: 0.4; margin-bottom: 14px; display: block; }
        .estado-tabla p  { margin: 0; font-size: 0.95rem; }

        /* ── Section divider header ────────────────────────────────────────── */
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin: 28px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Toast Notifications ───────────────────────────────────────────── */
        #toastContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2e45;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 18px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            min-width: 260px;
            max-width: 380px;
            cursor: pointer;
            animation: toastIn 0.3s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error   { border-left: 4px solid var(--danger); }
        .toast.hide    { animation: toastOut 0.3s ease forwards; }

        .toast-icon  { font-size: 1.1rem; flex-shrink: 0; }
        .toast-msg   { font-size: 0.88rem; font-weight: 500; flex: 1; }

        .toast-progress {
            position: absolute;
            bottom: 0; left: 0;
            height: 3px;
            background: var(--primary);
            width: 100%;
            animation: progressBar 3.2s linear forwards;
        }

        @keyframes toastIn  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); }   to { opacity: 0; transform: translateY(20px); } }
        @keyframes progressBar { from { width: 100%; } to { width: 0%; } }

        /* ── Buscador en tiempo real ────────────────────────────────────── */
        .search-wrapper {
            position: relative;
            margin-bottom: 22px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 11px 16px 11px 42px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input::placeholder { color: var(--text-dim); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,194,203,0.12);
        }
        /* Reset del icono 'x' nativo del input[type=search] */
        .search-input::-webkit-search-cancel-button { cursor: pointer; }

        /* ── Botón Regresar ────────────────────────────────────────────── */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 10px 20px;
            background: rgba(0,194,203,0.08);
            color: var(--primary);
            border: 1px solid rgba(0,194,203,0.25);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s ease;
            letter-spacing: -0.2px;
        }
        .btn-back:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            transform: translateX(-3px);
            box-shadow: 0 4px 16px rgba(0,194,203,0.3);
        }
        .btn-back i { font-size: 0.82rem; }

        /* ── Responsive helpers ────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
    <div class="sidebar">
        <div class="sidebar-top">
            <h2>SkillSyntax Admin</h2>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
                <a href="grupos.html"><i class="fas fa-layer-group"></i> Grupos</a>
                <a href="ejercicios.html" class="active"><i class="fas fa-book"></i> Ejercicios</a>
                <a href="reportes.html"><i class="fas fa-file-alt"></i> Reportes</a>
            </nav>
        </div>
        <a href="#" class="logout" onclick="event.preventDefault(); logout();">
            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </a>
    </div>

    <!-- ── Main Content ─────────────────────────────────────────────────────── -->
    <div class="content">

        <!-- Cabecera de página -->
        <div class="page-header">
            <h1>Ejercicios Generados</h1>
            <p class="subtitle">Explora y administra los resultados por alumno, grupo o de forma global.</p>
        </div>

        <!-- Selector de vista (Tab Pills) -->
        <div class="vista-selector" id="vistaSelectorBar">
            <button id="btn-vista-todos"   class="btn-vista" onclick="navegar('todos')">
                <i class="fas fa-list"></i> Todos
            </button>
            <button id="btn-vista-alumno"  class="btn-vista" onclick="navegar('alumno')">
                <i class="fas fa-user-graduate"></i> Por Alumno
            </button>
            <button id="btn-vista-grupo"   class="btn-vista" onclick="navegar('grupo')">
                <i class="fas fa-layer-group"></i> Por Grupo
            </button>
        </div>

        <!-- Breadcrumb (dinámico) -->
        <div id="breadcrumb" class="breadcrumb" style="display:none;"></div>

        <!-- Contenedor principal dinámico -->
        <div id="vistaContainer"></div>

    </div>

    <!-- ── Toasts ────────────────────────────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── Scripts ──────────────────────────────────────────────────────────── -->
    <script src="js/main.js"></script>
    <script src="js/ejercicios.js"></script>
</body>
</html>
