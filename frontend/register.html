<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SkillSyntax | Registro</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a1f3b, #0f2f59, #029e99);
        }

        .container {
            width: 90%;
            max-width: 520px;
            background: rgba(244, 244, 244, 0.95);
            backdrop-filter: blur(6px);
            padding: 35px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .logo {
            width: 90px;
            margin: 0 auto 20px auto;
            display: block;
        }

        h2 {
            margin: 0;
            font-size: 26px;
            color: #0a1f3b;
        }

        .subtitle {
            margin: 8px 0 25px 0;
            color: #666;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: #fff;
            transition: 0.25s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #029e99;
            box-shadow: 0 0 0 3px rgba(2, 158, 153, 0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: #029e99;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 10px;
        }

        button:hover {
            background: #027d79;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .login {
            margin-top: 18px;
            font-size: 14px;
        }

        .login a {
            color: #029e99;
            text-decoration: none;
            font-weight: 600;
        }

        .login a:hover {
            text-decoration: underline;
        }

        #msg {
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        @media(max-width:600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="logo.png" class="logo" alt="Logo">
        <h2>Crear cuenta</h2>
        <div class="subtitle">Comienza tu aprendizaje en SkillSyntax</div>

        <div class="form-grid">
            <div class="input-group">
                <input id="nombre" type="text" placeholder="Usuario">
            </div>
            <div class="input-group">
                <input id="email" type="email" placeholder="Correo electrónico">
            </div>
            <div class="input-group">
                <input id="password" type="password" placeholder="Contraseña">
            </div>
            <div class="input-group">
                <input id="confirmPassword" type="password" placeholder="Confirmar">
            </div>
        </div>

        <button id="btnRegistro" onclick="registrar()">Crear cuenta</button>

        <div class="login">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
        </div>

        <div id="msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
            authDomain: "skillsyntax-ai.firebaseapp.com",
            projectId: "skillsyntax-ai",
            storageBucket: "skillsyntax-ai.firebasestorage.app",
            messagingSenderId: "1027375145468",
            appId: "1:1027375145468:web:60b7023e38a3654ccbd279"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.registrar = async () => {
            const nombre = document.getElementById("nombre").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const msg = document.getElementById("msg");
            const btn = document.getElementById("btnRegistro");

            if (!nombre || !email || !password || !confirmPassword) {
                msg.innerText = "Completa todos los campos";
                msg.style.color = "red";
                return;
            }

            if (password !== confirmPassword) {
                msg.innerText = "Las contraseñas no coinciden";
                msg.style.color = "red";
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Creando cuenta...";

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                await updateProfile(userCredential.user, { displayName: nombre });

                try {
                    await fetch("https://skillsyntax-2war.onrender.com/guardar_usuario", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            nombre,
                            email,
                            password,
                            nivel_general: "Pendiente"
                        })
                    });
                } catch (dbError) {
                    console.error("Error guardando en BD local:", dbError);
                }

                msg.style.color = "green";
                msg.innerText = "¡Cuenta creada correctamente! 🎉";

                setTimeout(() => {
                    window.location.assign("index.html");
                }, 1500);

            } catch (error) {
                console.error("Error en el registro:", error);
                msg.style.color = "red";

                if (error.code === "auth/email-already-in-use") {
                    msg.innerText = "Este correo ya está registrado";
                } else if (error.code === "auth/weak-password") {
                    msg.innerText = "Contraseña débil (mín. 6 caracteres)";
                } else {
                    msg.innerText = "Hubo un problema al crear la cuenta";
                }

                btn.disabled = false;
                btn.innerText = "Crear cuenta";
            }
        };
    </script>
</body>
</html>
