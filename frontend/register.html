<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SkillSyntax | Registro</title>

    <style>
        :root {
            --bg-dark: #060e1a;
            --bg-card: #0d1b2e;
            --primary: #00c2cb;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --danger: #ff5f52;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 520px;
            background: var(--bg-card);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .logo {
            width: 90px;
            margin: 0 auto 20px auto;
            display: block;
        }

        h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input::placeholder {
            color: var(--text-dim);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,194,203,0.2);
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,194,203,0.3);
        }

        .back {
            margin-top: 15px;
            display: block;
            text-align: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover {
            color: var(--primary);
        }

        #msg {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        @media(max-width:600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="logo.png" class="logo" alt="Logo">
        <h2>Crear cuenta</h2>
        <div class="subtitle">Comienza tu aprendizaje en SkillSyntax</div>

        <div class="form-grid">
            <input id="nombre" type="text" placeholder="Usuario">
            <input id="email" type="email" placeholder="Correo electrónico">
            <input id="password" type="password" placeholder="Contraseña">
            <input id="confirmPassword" type="password" placeholder="Confirmar">
        </div>

        <button id="btnRegistro" onclick="registrar()">Crear cuenta</button>

        <a class="back" href="/admin/usuarios.html">Volver a usuarios</a>

        <div id="msg"></div>
    </div>

    <script type="module">

        const usuario = JSON.parse(localStorage.getItem("usuario"));

        if (!usuario || usuario.rol !== "admin") {
            window.location.href = "https://skillsyntaxai.elon.school";
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwkcdgnS4emDVWO2Thi3aNdAMV1N_Jf5M",
            authDomain: "skillsyntax-ai.firebaseapp.com",
            projectId: "skillsyntax-ai",
            storageBucket: "skillsyntax-ai.firebasestorage.app",
            messagingSenderId: "1027375145468",
            appId: "1:1027375145468:web:60b7023e38a3654ccbd279"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.registrar = async () => {
            const nombre = document.getElementById("nombre").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const msg = document.getElementById("msg");
            const btn = document.getElementById("btnRegistro");

            if (!nombre || !email || !password || !confirmPassword) {
                msg.innerText = "Completa todos los campos";
                msg.style.color = "red";
                return;
            }

            if (password !== confirmPassword) {
                msg.innerText = "Las contraseñas no coinciden";
                msg.style.color = "red";
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Creando cuenta...";

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                await updateProfile(userCredential.user, { displayName: nombre });

                await fetch("https://skillsyntax-2war.onrender.com/guardar_usuario", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nombre,
                        email,
                        password,
                        nivel_general: "Pendiente"
                    })
                });

                msg.style.color = "lightgreen";
                msg.innerText = "Usuario creado correctamente";

                setTimeout(() => {
                    window.location.assign("/admin/usuarios.html");
                }, 1500);

            } catch (error) {
                msg.style.color = "red";

                if (error.code === "auth/email-already-in-use") {
                    msg.innerText = "Este correo ya está registrado";
                } else if (error.code === "auth/weak-password") {
                    msg.innerText = "Contraseña débil (mín. 6 caracteres)";
                } else {
                    msg.innerText = "Hubo un problema al crear la cuenta";
                }

                btn.disabled = false;
                btn.innerText = "Crear cuenta";
            }
        };
    </script>

</body>
</html>
